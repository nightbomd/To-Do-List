<!doctype html>
<html lang="en" data-bs-theme="light">

<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS v5.3.8 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/emoji-picker/1.3.0/css/emoji.min.css">

</head>

<body>
    <header class=" bg-dark text-white">
        <h2 class="text-center mb-5 p-5">To-Do-List</h2>
    </header>
    <main class="container-fluid mt-5 rounded  p-4 ">
        <div class="row justify-content-center">
            <div class="col-md-12 col-lg-12">
                <div class="row">
                    <div class="col-2">
                        <input type="text" id="taskInput" placeholder="Enter a task">
                    </div>
                    <div class="col-2">
                        <button id="addTaskBtn" class="btn w-100">Add Task</button>
                    </div>
                    <div id="priority" class="col-1">
                        <div class="custom-select shadow-sm">
                            <div class="selected">Priority <img id="arrow" class="img-fluid" src="download.png" alt="Down arrow"></div>

                            <div class="options hidden">
                                <div class='prority-item'data-value="high">Priority</div>
                                <div  class='prority-item'data-value="high"><span id="high">High</span></div>
                                <div  class='prority-item'data-value="medium"><span id="medium">Medium</span></div>
                                <div  class='prority-item'data-value="low"><span id="low">Low</span></div>
                            </div>
                        </div>
                    </div>
                    <div class="row d-flex justify-content-center align-items-start">

                        <div class="col-6">
                            <div class="tasks mt-3 mb-3">
                                <div class="task-wrapper">
                                    <h5 class="sticky-top p-3">My Tasks:</h5>
                                    <ul id="taskList" class="list-group d-flex flex-column p-3 mb-3 w-75 m-auto">
                                    </ul>
                                </div>
                            </div>
                        </div>

                        <div class="col-6">
                            <div class="tasks mt-3 mb-3">
                                <div class="task-wrapper">
                                    <h5 class="sticky-top p-3">Finished Tasks:</h5>
                                    <ul id="finishedTaskList"
                                        class="list-group d-flex flex-column p-3 mb-3 w-75 m-auto">
                                    </ul>
                                </div>
                            </div>
                        </div>

                    </div>
                    <div class="row">
                        <div class="col-4 ">
                            <button id="clearTaskBtn" class="btn col-4  w-100">Clear All Tasks</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <!-- place footer here -->
    </footer>
    <!-- Bootstrap JavaScript Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/emoji-picker/1.3.0/js/emoji-picker.min.js"></script>

</body>

</html>
