<!doctype html>
<html lang="en" data-bs-theme="light">

<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS v5.3.8 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/emoji-picker/1.3.0/css/emoji.min.css">

</head>

<body>
    <main class="container text-center mt-5 rounded">
        <div class="somewhatofanavbar d-flex justify-content-between align-items-center">
            <h1 id="userGreeting" class="m-2 mb-4"></h1>
            <h1 id="date"></h1>
            <hr>
        </div>
        <div class="row justify-content-center">
            <div class="col-md-12 col-lg-12">
                <div class="row">
                    <div class="col-lg-2 col-md-2 col-sm-12 mb-2">
                        <input type="text" id="taskInput" class="shadow-sm" placeholder="Enter a task">
                    </div>
                    <div class="col-lg-2 col-md-2 col-sm-12 mb-2">
                        <button id="addTaskBtn" class="btn w-100 shadow-sm">Add Task</button>
                    </div>
                    <div id="priority" class="col-lg-2 col-md-2 col-sm-12">
                        <div class="custom-select shadow-sm">
                            <div class="selected">Priority </div>
                            <img id="arrow" class="img-fluid" src="download.png" alt="Down arrow">

                            <div class="options hidden col-12">
                                <div class='priority-item' data-value="urgent"><span class="urgent">Urgent</span></div>
                                <div class='priority-item' data-value="high"><span class="high">High</span></div>
                                <div class='priority-item' data-value="medium"><span class="medium">Medium</span></div>
                                <div class='priority-item' data-value="low"><span class="low">Low</span></div>
                            </div>
                        </div>
                    </div>
                    <div id="filter" class="col-lg-2 col-md-2 col-sm-12">
                        <div class="custom-select shadow-sm">
                            <div class="selected">Filter By: </div>
                            <img id="arrow" class="img-fluid" src="download.png" alt="Down arrow">

                            <div class="options hidden col-12">
                                <div class='priority-item' data-value="urgent"><span class="urgent">Urgent</span>
                                </div>
                                <div class='priority-item' data-value="high"><span class="high">High</span></div>
                                <div class='priority-item' data-value="medium"><span class="medium">Medium</span>
                                </div>
                                <div class='priority-item' data-value="low"><span class="low">Low</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row d-flex justify-content-center align-items-start">
                <div class="col-lg-6 col-md-6 col-sm-12">
                    <div class="tasks mt-3 mb-3">
                        <div class="task-wrapper">
                            <h5 class="p-3 fs-5">My Tasks:</h5>
                            <p id="taskCount" class="text-muted muted-text m-1">You have 0 tasks</p>
                            <ul id="taskList" class="list-group d-flex flex-column p-3 mb-3 w-75 m-auto">
                            </ul>
                        </div>
                        <div class="row mt-3">
                            <div class="col-12 ">
                                <button id="clearTaskBtn" class="btn col-4  w-100">Clear All Tasks</button>
                            </div>
                        </div>
                    </div>

                </div>
                <div class="col-lg-6 col-md-6 col-sm-12">
                    <div class="tasks mt-3 mb-3">
                        <div class="task-wrapper">
                            <h5 class="p-3 fs-5">Finished Tasks:</h5>
                            <p id="finishedTaskCount" class="text-muted muted-text m-1 text-center">You have 0 finished tasks</p>
                            <div class="d-flex justify-content-center align-items-center my-3">
                                <div
                                    style="position: relative; display: inline-flex; align-items: center; justify-content: center;">
                                    <div class="progress-ring"></div>
                                    <span class="progress-label">0</span>
                                </div>
                            </div>
                            <ul id="finishedTaskList" class="list-group d-flex flex-column p-3 mb-3 w-75 m-auto">
                            </ul>
                        </div>
                        <div class="row mt-3">
                            <div class="col-12 ">
                                <button id="clearTaskBtnFinished" class="btn col-4  w-100">Clear All Tasks</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        </div>
        </div>
        </div>
    </main>
    <footer>
        <!-- place footer here -->
    </footer>
    <button id="moonToggle">
        <img src="moon.png" alt="Toggle Dark Mode">
    </button>
    <button id="settingsToggle">
        <img src="settings.png" alt="Toggle Settings">
    </button>
    <!-- Bootstrap JavaScript Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/emoji-picker/1.3.0/js/emoji-picker.min.js"></script>

</body>

</html>
